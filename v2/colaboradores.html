  <main class="container">
    <section class="partners-hero reveal">
      <div>
        <p class="eyebrow">Gracias por hacerlo posible</p>
        <h1>Colaboradores</h1>
        <p>
          Empresas y entidades que apoyan la 10K Zolina con material, comida,
          infraestructura o ayuda para que la carrera salga adelante.
        </p>
        <div class="hero-actions compact-actions single-action">
          <a href="https://forms.gle/9uEHps9BrEYXebt8A" class="primary-button collaborate-button" target="_blank" rel="noopener">Quiero colaborar</a>
        </div>
      </div>

      <div class="partners-hero-card">
        <span>🤝</span>
        <strong id="partner-count">0</strong>
        <small>colaboradores</small>
      </div>
    </section>

    <section class="partners-toolbar reveal delay-1" aria-label="Filtros de colaboradores">
      <div class="filter-group search-group">
        <label for="buscar-colaborador">Buscar colaborador</label>
        <input id="buscar-colaborador" type="search" placeholder="Nombre, donación, descripción..." autocomplete="off" />
      </div>

      <div class="filter-group">
        <label for="tipo-colaborador">Tipo</label>
        <select id="tipo-colaborador">
          <option value="Todos">Todos</option>
          <option value="Material">Material</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Servicios">Servicios</option>
          <option value="Institucional">Institucional</option>
        </select>
      </div>
    </section>

    <section id="partners-grid" class="partners-grid reveal delay-2" aria-label="Listado de colaboradores"></section>
    <p id="sin-colaboradores" class="empty-message">No hay colaboradores para esta búsqueda.</p>
  </main>

      },
      {
        nombre: "Reyno Gourmet",
        tipo: "Marca",

      },

        nombre: "Malie estética avanzada",
        tipo: "Centro estética",
        logo: "./img/malie.PNG",
        descripcion: "Malie Estética Avanzada es un centro especializado en tratamientos de belleza y cuidado personal, que combina tecnología y atención personalizada para mejorar el bienestar y la imagen.",
        dona: "Sesiones para sortear"
      },

    const grid = document.getElementById("partners-grid");
    const empty = document.getElementById("sin-colaboradores");
    const count = document.getElementById("partner-count");
    const buscador = document.getElementById("buscar-colaborador");
    const tipoSelect = document.getElementById("tipo-colaborador");

    function iniciales(nombre) {
      return nombre
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map(palabra => palabra[0].toUpperCase())
        .join("");
    }

    function renderLogo(colaborador) {
      if (colaborador.logo) {
        return `<img src="${colaborador.logo}" alt="Logo de ${colaborador.nombre}" loading="lazy" />`;
      }

      return `<span>${iniciales(colaborador.nombre)}</span>`;
    }

    function renderColaboradores() {
      const texto = buscador.value.trim().toLowerCase();
      const tipo = tipoSelect.value;

      const filtrados = colaboradores.filter(colaborador => {
        const coincideTipo = tipo === "Todos" || colaborador.tipo === tipo;
        const contenido = `${colaborador.nombre} ${colaborador.tipo} ${colaborador.descripcion} ${colaborador.dona}`.toLowerCase();
        const coincideTexto = !texto || contenido.includes(texto);
        return coincideTipo && coincideTexto;
      });

      count.textContent = colaboradores.length;
      grid.innerHTML = "";

      if (filtrados.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      filtrados.forEach((colaborador, index) => {
        const card = document.createElement("article");
        card.className = "partner-card";
        card.style.animationDelay = `${index * 0.06}s`;
        card.innerHTML = `
          <div class="partner-card-top">
            <div class="partner-logo">${renderLogo(colaborador)}</div>
            <span class="soft-pill">${colaborador.tipo}</span>
          </div>

          <h2>${colaborador.nombre}</h2>
          <p>${colaborador.descripcion}</p>

          ${colaborador.dona ? `
            <div class="donation-box">
              <span>Donación / aportación</span>
              <strong>${colaborador.dona}</strong>
            </div>
          ` : ""}
        `;
        grid.appendChild(card);
      });
    }

    buscador.addEventListener("input", renderColaboradores);
    tipoSelect.addEventListener("change", renderColaboradores);

    renderColaboradores();
  </script>

</html>
