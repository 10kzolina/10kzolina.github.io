<section class="registrations-section">
  <div class="registrations-header">
    <p class="eyebrow">Inscripciones</p>
    <h2>Corredores inscritos</h2>
    <p class="section-description">
      Resumen actualizado de participantes inscritos por modalidad.
    </p>
  </div>

  <div id="registrations-status" class="registrations-status">
    Cargando inscripciones...
  </div>

  <div id="registrations-content" class="registrations-content" hidden>
    <div class="summary-grid">
      <article class="summary-card summary-card-total">
        <span class="summary-label">Total corredores</span>
        <strong id="total-runners">0</strong>
      </article>

      <article class="summary-card">
        <span class="summary-label">10K carrera</span>
        <strong id="count-10k">0</strong>
      </article>

      <article class="summary-card">
        <span class="summary-label">5K carrera</span>
        <strong id="count-5k-carrera">0</strong>
      </article>

      <article class="summary-card">
        <span class="summary-label">5K marcha</span>
        <strong id="count-5k-marcha">0</strong>
      </article>

      <article class="summary-card">
        <span class="summary-label">Txiki</span>
        <strong id="count-txiki">0</strong>
      </article>
    </div>

    <div class="table-header">
      <h3>Listado de corredores</h3>

      <input
        id="runner-search"
        class="runner-search"
        type="search"
        placeholder="Buscar por nombre, carrera o correo..."
      />
    </div>

    <div class="table-wrapper">
      <table class="runners-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Corredor</th>
            <th>Carrera</th>
            <th>Edad</th>
            <th>Teléfono</th>
            <th>Correo inscripción</th>
          </tr>
        </thead>
        <tbody id="runners-table-body"></tbody>
      </table>
    </div>
  </div>
</section>

<script src="inscripciones.js"></script>
